# Supabase local-dev configuration.
# Docs: https://supabase.com/docs/guides/cli/config

project_id = "dishine-convert"

[api]
enabled = true
port = 54321
schemas = ["public", "storage"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
major_version = 15

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:5173"
additional_redirect_urls = ["http://localhost:5173/account"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true

# Edge functions — one block per function, all sharing the `_shared/` folder.
[functions.convert-file]
verify_jwt = false

[functions.fetch-url]
verify_jwt = false

[functions.ops-unlock]
verify_jwt = false
