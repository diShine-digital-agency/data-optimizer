name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-typecheck-build:
    name: Lint / typecheck / build (front-end)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test --if-present

      - name: Build
        run: pnpm build
        env:
          VITE_SUPABASE_URL: https://example.supabase.co
          VITE_SUPABASE_PUBLISHABLE_KEY: dummy-key-for-build
          VITE_DEFAULT_LOCALE: en

  edge-functions:
    name: Check edge functions (Deno)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: v1.x

      - name: Type check — convert-file
        run: deno check supabase/functions/convert-file/index.ts

      - name: Type check — fetch-url
        run: deno check supabase/functions/fetch-url/index.ts

      - name: Type check — ops-unlock
        run: deno check supabase/functions/ops-unlock/index.ts
